<!DOCTYPE html>
<html>
<head>
    <title>Cricket Predictor</title>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            width: 460px;
            padding: 30px;
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(25px);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.3);
        }

        h1 {
            text-align: center;
            color: #00c6ff;
        }

        .vs-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .team {
            text-align: center;
        }

        .team img {
            width: 50px;
            height: 50px;
        }

        .vs {
            font-size: 22px;
            font-weight: bold;
            color: #ff4d4d;
        }

        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        select option {
            color: black;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 80, 100, 0.6);
        }

        /* Loader */
        .spinner {
            width: 40px;
            height: 40px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #00c6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,255,150,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar */
        .bar-container {
            width: 100%;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .bar {
            height: 12px;
            background: linear-gradient(90deg, #00ffcc, #00c6ff);
            border-radius: 10px;
            animation: growBar 1s ease-in-out;
        }

        @keyframes growBar {
            from { width: 0; }
        }

    </style>
</head>

<body>

<div class="card">

    <h1>🏏 Cricket Predictor</h1>

    <form method="POST">

        <label>Team 1</label>
        <select name="team1" onchange="updateTeams()">
            <option>India</option>
            <option>Australia</option>
            <option>England</option>
            <option>Pakistan</option>
            <option>CSK</option>
            <option>MI</option>
            <option>RCB</option>
            <option>KKR</option>
            <option>SRH</option>
        </select>

        <label>Team 2</label>
        <select name="team2" onchange="updateTeams()">
            <option>Australia</option>
            <option>India</option>
            <option>England</option>
            <option>Pakistan</option>
            <option>CSK</option>
            <option>MI</option>
            <option>RCB</option>
            <option>KKR</option>
            <option>SRH</option>
        </select>

        <!-- VS DISPLAY -->
        <div class="vs-box">
            <div class="team">
                <img id="logo1" src="https://flagcdn.com/w40/in.png">
                <div id="name1">India</div>
            </div>

            <div class="vs">VS</div>

            <div class="team">
                <img id="logo2" src="https://flagcdn.com/w40/au.png">
                <div id="name2">Australia</div>
            </div>
        </div>

        <label>Match Type</label>
        <select name="match_type">
            <option>ODI</option>
            <option>T20</option>
            <option>Test</option>
            <option>IPL</option>
        </select>

        <label>Toss Winner</label>
        <select name="toss">
            <option>Team1</option>
            <option>Team2</option>
        </select>

        <label>Venue</label>
        <select name="venue">
            <option>Mumbai</option>
            <option>Delhi</option>
            <option>Chennai</option>
            <option>Kolkata</option>
            <option>Bangalore</option>
        </select>

        <button type="submit" onclick="showLoader()">⚡ Predict Now</button>

    </form>

    <!-- LOADING -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Analyzing match...</p>
    </div>

    <!-- RESULT -->
    {% if result %}
    <div class="result">
        🏆 Winner: <b>{{ result }}</b><br><br>

        <div class="bar-container">
            <div class="bar" style="width: {{ prob*100 }}%"></div>
        </div>

        <p>Confidence: {{ (prob*100)|round(2) }}%</p>
    </div>

    <script>
        confetti({
            particleCount: 120,
            spread: 80,
            origin: { y: 0.6 }
        });
    </script>
    {% endif %}

</div>

<script>
const logos = {
    "India": "https://flagcdn.com/w40/in.png",
    "Australia": "https://flagcdn.com/w40/au.png",
    "England": "https://flagcdn.com/w40/gb.png",
    "Pakistan": "https://flagcdn.com/w40/pk.png",
    "CSK": "https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg",
    "MI": "https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg",
    "RCB": "https://upload.wikimedia.org/wikipedia/en/4/4d/Royal_Challengers_Bangalore_Logo.svg",
    "KKR": "https://upload.wikimedia.org/wikipedia/en/4/4c/Kolkata_Knight_Riders_Logo.svg",
    "SRH": "https://upload.wikimedia.org/wikipedia/en/8/81/Sunrisers_Hyderabad_Logo.svg"
};

function updateTeams() {
    let t1 = document.getElementsByName("team1")[0].value;
    let t2 = document.getElementsByName("team2")[0].value;

    document.getElementById("logo1").src = logos[t1];
    document.getElementById("logo2").src = logos[t2];

    document.getElementById("name1").innerText = t1;
    document.getElementById("name2").innerText = t2;
}

function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
